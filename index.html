}

function enforceTeamLimit(dtId) {
  // Auto-remove excess players (more than 4 from same team, counting titulares + suplentes)
  const roster = state.dtTeams[dtId] || [];
  const subs = state.dtSubs[dtId] || {};
  const teamCounts = {};
  const toRemove = [];
  // Count subs first (they have priority to stay? no — titulares have priority)
  // Iterate titulares in reverse so we remove the last-added ones
  for (let i = roster.length - 1; i >= 0; i--) {
    const pid = roster[i];
    const p = state.players.find(pl => pl.id === pid);
    const key = (p && p.teamId) ? p.teamId : '__sinequipo__';
    teamCounts[key] = (teamCounts[key] || 0) + 1;
    if (teamCounts[key] > 4) toRemove.push(pid);
  }
  // Then check subs
  const subsToRemove = [];
  for (const pos in subs) {
    const pid = subs[pos];
    const p = state.players.find(pl => pl.id === pid);
    const key = (p && p.teamId) ? p.teamId : '__sinequipo__';
    teamCounts[key] = (teamCounts[key] || 0) + 1;
    if (teamCounts[key] > 4) subsToRemove.push(pos);
  }
  let changed = false;
  let subsChanged = false;
  if (toRemove.length > 0) {
    state.dtTeams[dtId] = roster.filter(pid => !toRemove.includes(pid));
    uncheckTeamComplete(dtId);
    changed = true;
  }
  if (subsToRemove.length > 0) {
    subsToRemove.forEach(pos => delete state.dtSubs[dtId][pos]);
    uncheckTeamComplete(dtId);
    subsChanged = true;
  }
  if (changed) save();
  if (subsChanged) saveSubs();
  return changed || subsChanged;
}

function enforceBudget(dtId) {
  // Si el DT excede el presupuesto, quitar el titular más caro hasta volver a positivo
  if (!state.dtTeams[dtId]) return false;
  let changed = false;
  while (getDtBudgetLeft(dtId) < 0) {
    const roster = state.dtTeams[dtId];
    if (roster.length === 0) break;
    // Encontrar el titular más caro
    let maxValor = -1, maxPid = null;
    for (const pid of roster) {
      const p = state.players.find(pl => pl.id === pid);
      const v = p ? (p.valor || 0) : 0;
      if (v > maxValor) { maxValor = v; maxPid = pid; }
    }
    if (!maxPid) break;
    state.dtTeams[dtId] = roster.filter(id => id !== maxPid);
    uncheckTeamComplete(dtId);
    changed = true;
  }
  if (changed) save();
  return changed;
}

function renderDtEquipo() {
  try {
  enforceTeamLimit(currentDtId);
  enforceBudget(currentDtId);
  checkTeamComplete(currentDtId); // registrar fecha si el equipo ya está completo
  // Capitán automático: si tiene jugadores pero no tiene capitán asignado
  if (!state.dtCaptains[currentDtId]) {
    const roster = state.dtTeams[currentDtId] || [];
    if (roster.length > 0) {
      state.dtCaptains[currentDtId] = roster[roster.length - 1];
      save();
    }
  }
  const tc = document.getElementById('tab-content');
  const totalPts = calcDtPts(currentDtId);
  const dt = state.dts.find(d => d.id === currentDtId);
  const formation = getDtFormation();
  const formationRows = FORMATIONS[formation];

  // Fecha a visualizar: dtViewFecha o la activa por default
  const viewFecha = dtViewFecha || state.activeFecha || null;

  // Solo usar snapshot cuando se elige explícitamente una fecha distinta a la activa
  const isViewingHistorical = dtViewFecha !== null && dtViewFecha !== state.activeFecha;
  const viewHistory = isViewingHistorical && viewFecha && state.dtRosterHistory && state.dtRosterHistory[currentDtId] && state.dtRosterHistory[currentDtId][viewFecha];
  const roster = (viewHistory && viewHistory.roster && viewHistory.roster.length > 0) ? viewHistory.roster : getDtRoster();
  const captainId = viewHistory ? (viewHistory.captain || null) : (state.dtCaptains[currentDtId] || null);
  // Esquema: usar el del snapshot solo si es válido
  const viewFormation = (viewHistory && viewHistory.formation && FORMATIONS[viewHistory.formation]) ? viewHistory.formation : formation;
  const viewFormationRows = FORMATIONS[viewFormation] || formationRows;

  // Fechas disponibles (con al menos un partido)
  const fechasDisponibles = [...new Set(state.matches.map(m => m.fechaNum).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));

  // Pts de un jugador en la fecha visualizada
  function playerViewPts(pid) {
    if (!viewFecha) return 0;
    const matchesF = state.matches.filter(m => m.fechaNum === viewFecha);
    return matchesF.reduce((sum, m) => sum + calcPlayerMatchPts(pid, m.id), 0);
  }

  // Pts totales del DT en la fecha visualizada (usando roster del snapshot si existe)
  const dtViewFechaPts = roster.reduce((sum, pid) => {
    const pts = playerViewPts(pid);
    if (pid !== captainId) return sum + pts;
    const viewFechaMatches = viewFecha ? state.matches.filter(m => m.fechaNum === viewFecha) : [];
    const clarinExtra = viewFechaMatches.reduce((s,m) => s + calcPlayerMatchClarinPts(pid, m.id), 0);
    return sum + pts + clarinExtra;
  }, 0);

  // Build slots
  let slots = [];
   (isViewingHistorical ? viewFormationRows : formationRows).forEach(row => {
    for (let i = 0; i < row.count; i++) slots.push({ pos: row.pos, playerId: null });
  });
  let rosterByPos = {};
  roster.forEach(pid => {
    const p = state.players.find(pl => pl.id === pid);
    if (!p) return;
    if (!rosterByPos[p.pos]) rosterByPos[p.pos] = [];
    rosterByPos[p.pos].push(pid);
  });
  slots.forEach(slot => {
    const pool = rosterByPos[slot.pos] || [];
    if (pool.length > 0) slot.playerId = pool.shift();
  });

  // Suplentes del DT — usar snapshot si existe para fecha histórica
  const subs = (viewHistory && isViewingHistorical) ? (viewHistory.subs || {}) : getDtSubs(currentDtId);

  // Determine which match to check nojugo against (first match of viewFecha, or activeFecha)
  const fechaForNojugo = viewFecha || state.activeFecha || null;
  const matchForNojugo = fechaForNojugo
    ? state.matches.filter(m => m.fechaNum === fechaForNojugo)[0] || null
    : null;

  // Track which suplente positions are already "active" (used to replace a nojugo)
  const subActivatedPos = {};

  let pitchHtml = '';
  (isViewingHistorical ? viewFormationRows : formationRows).forEach(row => {
    const rowSlots = slots.filter(s => s.pos === row.pos);
    pitchHtml += `<div class="pitch-row">`;
    rowSlots.forEach(slot => {
      const globalIdx = slots.indexOf(slot);
      let p = slot.playerId ? state.players.find(pl => pl.id === slot.playerId) : null;

      // Check if titular has nojugo in current match
      const titularNoJugo = p && matchForNojugo && playerNoJugo(p.id, matchForNojugo.id);
      const subPid = subs[row.pos] || null;
      const subNotYetUsed = !subActivatedPos[row.pos];

      // If titular nojugo and suplente available and not yet used → show suplente
      let showingSub = false;
      let titularName = p ? p.name.split(' ')[0] : null;
      if (titularNoJugo && subPid && subNotYetUsed) {

        showingSub = true;
        p = state.players.find(pl => pl.id === subPid); // show sub in pitch
      }

      const isCaptain = p && p.id === captainId;
      const fPts = p ? playerViewPts(p.id) : 0;

      if (showingSub) {

          <div class="slot-pts" style="color:${fPts>0?'#00C853':fPts<0?'#FF1744':'#6A8F6A'}">${viewFecha?(fPts>0?'+':'')+fPts:'—'}</div>
        </div>`;
      } else if (titularNoJugo) {
        // Titular nojugo, sin suplente disponible — mostrar tachado
        pitchHtml += `<div class="pitch-slot filled" onclick="openSlotModal(${globalIdx}, '${slot.pos}')">
          <div class="slot-circle" style="border-color:#555;background:#22222244;opacity:0.5">
            ${posEmoji(p ? p.pos : row.pos)}
          </div>
          <div class="slot-name" style="color:#555;text-decoration:line-through">${p ? p.name : '?'}</div>
              ${p && state.teams.find(t=>t.id===p.teamId) ? `<div class="slot-team-name" style="color:#444">${state.teams.find(t=>t.id===p.teamId).name}</div>` : ''}

        const estadoBorder = isCaptain ? '#00E5FF' : (p ? estadoColor : '');

        pitchHtml += `<div class="pitch-slot ${p?'filled':''}" onclick="openSlotModal(${globalIdx}, '${slot.pos}')">

        </div>`;
      }
    });
    pitchHtml += `</div>`;
  });

  // Build subs row for pitch
  const posiciones = ['Arquero', 'Defensor', 'Mediocampista', 'Delantero'];
  const subsRowHtml = posiciones.map(pos => {
    const subPid = subs[pos] || null;
    const subPlayer = subPid ? state.players.find(p => p.id === subPid) : null;

              const roster = state.dtTeams[d.id] || [];

              return roster.includes(p.id) || Object.values(subs).includes(p.id);
            }).length;
            return `<div class="player-item" onclick="${canAfford || !state.mercadoAbierto ? `addToTeam('${p.id}')` : `alert('No tenés saldo suficiente para fichar a ${p.name}')`}" style="${!canAfford && state.mercadoAbierto?'opacity:0.5':''}">
              <div class="player-info">
                <div class="player-name">${p.name} ${!canAfford && state.mercadoAbierto ? '<span style="color:var(--red);font-size:0.7rem">Sin saldo</span>' : ''}</div>
                <div class="player-meta">${team?team.name:'Sin equipo'} ${dtCount > 0 ? `<span style="color:#90CAF9;font-size:0.68rem;margin-left:0.3rem">· en ${dtCount} equipo${dtCount>1?'s':''}</span>` : `<span style="color:#ff6b6b;font-size:0.68rem;margin-left:0.3rem">· no estás en ningún equipo burro</span>`}</div>
              </div>
              <div style="text-align:right">
                <div style="font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:700;color:var(--gold)">${p.valor ? '$'+p.valor+'M' : '—'}</div>
                <div class="player-pts" style="font-size:0.72rem">${calcPlayerTotalPts(p.id)} pts</div>
              </div>
            </div>`;
          }).join('')}
        </div>`}
        <div class="modal-actions"><button class="btn btn-secondary" onclick="lastSwappedOut=null;closeModal()">Cancelar</button></div>
      </div>
    </div>`;
  document.getElementById('modal-container').innerHTML = html;
}

function buildSlots() {
  const roster = getDtRoster();
  const formation = getDtFormation();
  const formationRows = FORMATIONS[formation];
  let slots = [];
  formationRows.forEach(row => {
    for (let i = 0; i < row.count; i++) slots.push({ pos: row.pos, playerId: null });
  });
  let rosterByPos = {};
  roster.forEach(pid => {
    const p = state.players.find(pl => pl.id === pid);
    if (!p) return;
    if (!rosterByPos[p.pos]) rosterByPos[p.pos] = [];
    rosterByPos[p.pos].push(pid);
  });
  slots.forEach(slot => {
    const pool = rosterByPos[slot.pos] || [];
    if (pool.length > 0) slot.playerId = pool.shift();
  });
  return slots;
}

function addToTeam(playerId) {
  if (!state.dtTeams[currentDtId]) state.dtTeams[currentDtId] = [];
  const roster = state.dtTeams[currentDtId];
  if (roster.includes(playerId)) return;
  // Si elige el mismo jugador que ya tenía → cancelar sin cambios
  if (playerId === lastSwappedOut) { lastSwappedOut = null; closeModal(); renderDt('equipo'); return; }
  const isSwap = !!lastSwappedOut;
  // Verificar si el jugador elegido ya está en suplentes
  const isFromBench = state.dtSubs[currentDtId] && Object.values(state.dtSubs[currentDtId]).includes(playerId);
  if (!isSwap && roster.length >= 11) { alert('Ya tenés 11 titulares.'); return; }
  // Si viene del banco en un swap, no cuenta como transferencia
  if (!isFromBench && !canDtTransfer(currentDtId)) { alert(`Ya usaste las ${MAX_TRANSFERS_PER_FECHA} transferencias permitidas para esta fecha.`); lastSwappedOut = null; return; }
  const p = state.players.find(pl => pl.id === playerId);
  if (p && p.teamId) {
    const sameTeamCount = roster.filter(pid => {
      if (pid === lastSwappedOut) return false; // no contar al que va a salir
      const rp = state.players.find(pl => pl.id === pid);
      return rp && rp.teamId === p.teamId;
    }).length;
    if (sameTeamCount >= 4) {
      const team = state.teams.find(t => t.id === p.teamId);
      alert('No podés agregar a ' + p.name + '. Ya tenés 4 jugadores de ' + (team ? team.name : 'ese equipo') + ' (máximo permitido).');
      return;
    }
  }
  if (p && (p.valor||0) > getDtBudgetLeft(currentDtId) + (lastSwappedOut ? (state.players.find(pl=>pl.id===lastSwappedOut)?.valor||0) : 0)) {
    alert('No tenés saldo suficiente para fichar a ' + p.name + '.'); return;
  }
  // Confirmación antes del swap
  if (isSwap) {
    const outPlayer = state.players.find(pl => pl.id === lastSwappedOut);
    const outName = outPlayer ? outPlayer.name : 'jugador actual';
    if (!confirm(`¿Confirmás el cambio?\n\n🔴 Sale: ${outName}\n🟢 Entra: ${p ? p.name : playerId}`)) return;
  }
  // Quitar del banco si ya estaba de suplente
  if (state.dtSubs[currentDtId]) {
    Object.keys(state.dtSubs[currentDtId]).forEach(pos => {
      if (state.dtSubs[currentDtId][pos] === playerId) {
        delete state.dtSubs[currentDtId][pos];
      }
    });
  }
  // Ejecutar el swap
  if (isSwap) {
    state.dtTeams[currentDtId] = roster.filter(id => id !== lastSwappedOut);
    if (state.mercadoAbierto && p) {
      state.transfers = state.transfers || [];
      state.transfers.push({ dtId: currentDtId, playerId, playerName: p.name, type: 'fichar', valor: p.valor||0, fecha: new Date().toLocaleDateString('es-AR') });
    }
    state.dtTeams[currentDtId].push(playerId);
    // Solo contar transferencia si NO viene del banco propio
    if (!isFromBench) registerDtTransfer(currentDtId);
  } else {
    if (state.mercadoAbierto && p) {
      state.transfers = state.transfers || [];
      state.transfers.push({ dtId: currentDtId, playerId, playerName: p.name, type: 'fichar', valor: p.valor||0, fecha: new Date().toLocaleDateString('es-AR') });
    }
    state.dtTeams[currentDtId].push(playerId);
    if (!isFromBench) registerDtTransfer(currentDtId);
  }
  lastSwappedOut = null;
  // Capitán automático: si no tiene capitán, el último jugador agregado es el capitán
  if (!state.dtCaptains[currentDtId]) {
    const roster = state.dtTeams[currentDtId] || [];
    if (roster.length > 0) state.dtCaptains[currentDtId] = roster[roster.length - 1];
  }
  checkTeamComplete(currentDtId);
  save();
  closeModal();
  renderDt('equipo');
}

function openSubModal(pos, teamFilter='todos', sortVal='pts') {
  if (!state.mercadoAbierto) return;
  const subs = getDtSubs(currentDtId);

    !roster.includes(p.id) &&

    if (sortVal === 'desc') return (b.valor||0) - (a.valor||0);
    return calcPlayerTotalPts(b.id) - calcPlayerTotalPts(a.id);
  });
  const rows = available.length === 0

        const dtCountSub = state.dts.filter(d => {
          const r = state.dtTeams[d.id] || [];
          const s = state.dtSubs[d.id] || {};
          return r.includes(p.id) || Object.values(s).includes(p.id);
        }).length;

            <div style="font-weight:700">${p.name}</div>
            <div style="font-size:0.75rem;color:var(--muted)">${team ? team.name : ''} · <span class="badge ${getBadgeClass(p.pos)}">${p.pos}</span> · <span style="color:var(--gold)">$${p.valor||'—'}M</span></div>
            <div style="font-size:0.68rem;margin-top:0.1rem">${dtCountSub > 0 ? `<span style="color:#90CAF9">· en ${dtCountSub} equipo${dtCountSub>1?'s':''}</span>` : `<span style="color:#ff6b6b">· no estás en ningún equipo burro</span>`}</div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="assignSub('${pos}','${p.id}')" ${canAfford?'':'disabled style="opacity:0.4"'}>
            ${canAfford ? 'Elegir' : 'Sin saldo'}
          </button>
        </div>`;
      }).join('');

  const subTeamChips = `
    <div class="filter-chip ${teamFilter==='todos'?'active':''}" onclick="openSubModal('${pos}','todos','${sortVal}')">Todos</div>
    ${state.teams.map(t => `<div class="filter-chip ${teamFilter===t.id?'active':''}" onclick="openSubModal('${pos}','${t.id}','${sortVal}')">${t.name}</div>`).join('')}
  `;
  const subSortChips = `
    <div class="filter-chip ${sortVal==='pts'?'active':''}" onclick="openSubModal('${pos}','${teamFilter}','pts')">Puntos</div>
    <div class="filter-chip ${sortVal==='desc'?'active':''}" onclick="openSubModal('${pos}','${teamFilter}','desc')">Mayor valor</div>
    <div class="filter-chip ${sortVal==='asc'?'active':''}" onclick="openSubModal('${pos}','${teamFilter}','asc')">Menor valor</div>
  `;
  document.getElementById('modal-container').innerHTML = `
    <div class="modal-overlay" onclick="lastSwappedOut=null;closeModal()">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>🔄 Suplente ${pos}</span>
          <button class="btn btn-secondary btn-sm" onclick="lastSwappedOut=null;closeModal()" style="font-size:0.75rem;padding:0.25rem 0.7rem">✕ Cancelar</button>
        </div>
        <div style="font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem">Filtrar por equipo</div>
        <div class="filter-bar" style="margin-bottom:0.6rem">${subTeamChips}</div>
        <div style="font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem">Ordenar por valor</div>

        <div class="modal-actions"><button class="btn btn-secondary" onclick="lastSwappedOut=null;closeModal()">Cancelar</button></div>

}

function rotateTitularSub(titularId, suplId) {
  // Intercambiar titular <-> suplente sin contar transferencia
  const titP = state.players.find(p => p.id === titularId);
  const supP = state.players.find(p => p.id === suplId);
  const titName = titP ? titP.name : 'titular';
  const supName = supP ? supP.name : 'suplente';
  if (!confirm('↕️ Rotar sin transferencia\n\n🔴 Sale de titular: ' + titName + '\n🟢 Entra de titular: ' + supName + '\n\n' + titName + ' pasa al banco como suplente.')) return;
  // Encontrar la posición del suplente en el banco
  const subs = state.dtSubs[currentDtId] || {};
  let subPos = null;
  Object.entries(subs).forEach(([pos, pid]) => { if (pid === suplId) subPos = pos; });
  if (!subPos) { alert('Error: no se encontró la posición del suplente.'); return; }
  // Quitar titular del roster
  state.dtTeams[currentDtId] = (state.dtTeams[currentDtId] || []).filter(id => id !== titularId);
  // Poner suplente en el roster
  state.dtTeams[currentDtId].push(suplId);
  // Poner titular en el banco en la posición del suplente
  state.dtSubs[currentDtId][subPos] = titularId;
  lastSwappedOut = null;
  save();
  saveSubs();
  closeModal();
  renderDt('equipo');
}

function assignSub(pos, playerId) {
  if (!state.dtSubs[currentDtId]) state.dtSubs[currentDtId] = {};
  // Si elige el mismo suplente → cancelar sin cambios
  if (playerId === lastSwappedOut) { lastSwappedOut = null; closeModal(); renderDt('equipo'); return; }
  if (!canDtTransfer(currentDtId)) { alert(`Ya usaste las ${MAX_TRANSFERS_PER_FECHA} transferencias permitidas para esta fecha.`); lastSwappedOut = null; renderDt('equipo'); return; }
  const p = state.players.find(pl => pl.id === playerId);
  const outPlayer2 = lastSwappedOut ? state.players.find(pl => pl.id === lastSwappedOut) : null;
  const swapBonus2 = outPlayer2 ? (outPlayer2.valor||0) : 0;
  if (p && (p.valor||0) > getDtBudgetLeft(currentDtId) + swapBonus2) {
    alert('No tenés saldo suficiente.'); return;
  }
  if (p && p.teamId) {
    const roster = state.dtTeams[currentDtId] || [];
    const allSubs = Object.values(state.dtSubs[currentDtId] || {}).filter(id => id !== lastSwappedOut);
    const sameTeam = [...roster, ...allSubs].filter(pid => {
      const rp = state.players.find(pl => pl.id === pid);
      return rp && rp.teamId === p.teamId;
    }).length;
    if (sameTeam >= 4) {
      const team = state.teams.find(t => t.id === p.teamId);
      alert('Ya tenés 4 jugadores de ' + (team ? team.name : 'ese equipo') + ' (máximo permitido.)');
      return;
    }
  }
  const isSwap = !!lastSwappedOut;
  // Confirmación antes del swap de suplente
  if (isSwap) {
    const outPlayer = state.players.find(pl => pl.id === lastSwappedOut);
    const outName = outPlayer ? outPlayer.name : 'suplente actual';
    if (!confirm(`¿Confirmás el cambio?\n\n🔴 Sale: ${outName}\n🟢 Entra: ${p ? p.name : playerId}`)) return;
  }
  state.dtSubs[currentDtId][pos] = playerId;
  // Contar transferencia solo si el DT ya tiene límite (completó equipo en fecha anterior)
  const _fc = Number((state.dtFechaCompletado||{})[currentDtId]||0);
  const _af = Number(state.activeFecha||0);
  if (_af > 1 && _fc > 0 && _fc < _af) {
    registerDtTransfer(currentDtId);
  }
  lastSwappedOut = null;
  checkTeamComplete(currentDtId);
  saveSubs();
  save(); // necesario para persistir dtFechaCompletado si el equipo quedó completo
  closeModal();
  renderDt('equipo');
}

function removeSub(pos) {
  if (!state.dtSubs[currentDtId]) return;
  if (!canDtTransfer(currentDtId)) { alert(`Ya usaste las ${MAX_TRANSFERS_PER_FECHA} transferencias permitidas para esta fecha.`); return; }
  lastSwappedOut = state.dtSubs[currentDtId][pos] || null;
  // NO borramos ni contamos todavía — esperamos confirmación del nuevo suplente
  openSubModal(pos);
}

function removeFromTeam(playerId) {
  if (!state.dtTeams[currentDtId]) return;
  if (!canDtTransfer(currentDtId)) { alert(`Ya usaste las ${MAX_TRANSFERS_PER_FECHA} transferencias permitidas para esta fecha.`); closeModal(); return; }
  const p = state.players.find(pl => pl.id === playerId);
  if (state.mercadoAbierto && p) {
    state.transfers = state.transfers || [];
    state.transfers.push({
      dtId: currentDtId, playerId, playerName: p.name,
      type: 'vender', valor: p.valor||0,
      fecha: new Date().toLocaleDateString('es-AR')
    });
  }
  state.dtTeams[currentDtId] = state.dtTeams[currentDtId].filter(id => id !== playerId);
  registerDtTransfer(currentDtId);
  lastSwappedOut = null;
  uncheckTeamComplete(currentDtId);
  save();
  closeModal();
  renderDt('equipo');
}

let dtJugadoresState = { teamFilter:'todos', sortField:'pts', sortDir:'desc', posFilter:'todos' };

function renderDtJugadores(teamFilter, sortField, sortDir, posFilter) {
  // Actualizar solo los parámetros que se pasaron
  if (teamFilter  !== undefined) dtJugadoresState.teamFilter  = teamFilter;
  if (sortField   !== undefined) dtJugadoresState.sortField   = sortField;
  if (sortDir     !== undefined) dtJugadoresState.sortDir     = sortDir;
  if (posFilter   !== undefined) dtJugadoresState.posFilter   = posFilter;

  sortField  = dtJugadoresState.sortField;
  sortDir    = dtJugadoresState.sortDir;

    .filter(p => (teamFilter === 'todos' || p.teamId === teamFilter) && (posFilter === 'todos' || p.pos === posFilter))

      if (sortField === 'valor') return sortDir === 'desc' ? (b.valor||0)-(a.valor||0) : (a.valor||0)-(b.valor||0);

      if (sortField === 'elegido') {
        const countA = state.dts.filter(d => { const r=state.dtTeams[d.id]||[]; const s=state.dtSubs[d.id]||{}; return r.includes(a.id)||Object.values(s).includes(a.id); }).length;
        const countB = state.dts.filter(d => { const r=state.dtTeams[d.id]||[]; const s=state.dtSubs[d.id]||{}; return r.includes(b.id)||Object.values(s).includes(b.id); }).length;

      }

  const teamChips = `
    <div class="filter-chip ${teamFilter==='todos'?'active':''}" onclick="renderDtJugadores('todos','${sortField}','${sortDir}','${posFilter}')">Todos</div>

    const isActive = sortField === field && sortDir === dir;
    return `<div class="filter-chip ${isActive?'active':''}" onclick="renderDtJugadores('${teamFilter}','${field}','${dir}','${posFilter}')">${label}</div>`;
  };

  tc.innerHTML = `
    <div class="card">
      <div style="font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem">Posición</div>
      <div class="filter-bar" style="margin-bottom:0.75rem">${posChips}</div>
      <div style="font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem">Equipo</div>
      <div class="filter-bar" style="margin-bottom:0.75rem">${teamChips}</div>
      <div style="font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.4rem">Ordenar</div>
      <div class="filter-bar" style="margin-bottom:0.9rem">
        ${sortBtn('valor','asc','💰 Menor valor')}${sortBtn('valor','desc','💰 Mayor valor')}${sortBtn('pts','desc','⭐ Más puntos')}${sortBtn('pts','asc','📉 Menos puntos')}${sortBtn('elegido','desc','👥 Más elegido')}

function dtFicharJugador(pid) {

  if ((p.valor||0) > left) { alert('No tenés saldo suficiente para fichar a ' + p.name + '. Necesitás $' + (p.valor||0) + 'M pero solo tenés $' + left + 'M.'); return; }
  const newLeft = left - (p.valor||0);

function dtConfirmarFichaje(pid) {
  const p = state.players.find(pl => pl.id === pid);

  state.dtTeams[currentDtId].push(pid);
  state.transfers = state.transfers || [];
  state.transfers.push({

    type: 'fichar', valor: p?.valor||0,
    fecha: new Date().toLocaleDateString('es-AR')

}

function renderDtHistorial() {
  const tc = document.getElementById('tab-content');
  const fechas = [...new Set(state.matches.map(m => m.fechaNum).filter(Boolean))]
    .sort((a,b) => Number(b) - Number(a));

    tc.innerHTML = `<div style="padding:1rem"><div class="empty-state"><div class="empty-icon">📋</div><p>No hay fechas jugadas aún</p></div></div>`;
    return;
  }

  const rows = fechas.map(f => {
    const pts = calcDtFechaPts(currentDtId, f);
    const matches = state.matches.filter(m => m.fechaNum === f);
    // Usar snapshot histórico si existe, si no usar roster actual
    const history = state.dtRosterHistory && state.dtRosterHistory[currentDtId] && state.dtRosterHistory[currentDtId][f];
    const roster = history ? (history.roster || []) : (state.dtTeams[currentDtId] || []);
    const subs = history ? Object.values(history.subs || {}) : Object.values(state.dtSubs[currentDtId] || {});

    const captainId = history ? (history.captain || null) : (state.dtCaptains[currentDtId] || null);

    // Jugadores con sus puntos de esa fecha
    const jugadoresConPts = allPids.map(pid => {
      const player = state.players.find(p => p.id === pid);
      if (!player) return null;
      const ptsJug = matches.reduce((s,m) => s + calcPlayerMatchPts(pid, m.id), 0);
      const esSub = !roster.includes(pid);
      const esCapitan = pid === captainId;
      return { player, pts: ptsJug, esSub, esCapitan };
    }).filter(Boolean).sort((a,b) => b.pts - a.pts);

    const jugadoresHtml = jugadoresConPts.map(j => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0.3rem 0;border-bottom:1px solid rgba(255,255,255,0.04)">

          ${j.esSub ? '<span style="font-size:0.6rem;color:var(--muted);background:rgba(255,255,255,0.06);border-radius:3px;padding:0.05rem 0.3rem">SUP</span>' : ''}
          <span style="font-size:0.62rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif">${j.player.pos||''}</span>
        </div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1rem;color:${j.pts>0?'var(--green)':j.pts<0?'var(--red)':'var(--muted)'}">
          ${j.pts > 0 ? '+' : ''}${j.pts}
        </div>
      </div>`).join('');

    return `<div style="background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:0.75rem;overflow:hidden">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:0.85rem 1rem;cursor:pointer;border-bottom:1px solid var(--border)"
           onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--gold);letter-spacing:0.05em">Fecha ${f}</div>
          <div style="font-size:0.72rem;color:var(--muted)">${matches.length} partido${matches.length>1?'s':''} · tocá para ver el equipo</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:${pts>0?'var(--green)':'var(--muted)'};line-height:1">${pts}</div>
          <div style="font-size:0.62rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.08em;text-transform:uppercase">pts</div>
        </div>

      <div style="display:none;padding:0.75rem 1rem">

      </div>
    </div>`;
  }).join('');

  tc.innerHTML = `<div style="padding:1rem">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.75rem;display:flex;align-items:center;gap:0.4rem">
      <span style="width:3px;height:1rem;background:var(--gold);border-radius:2px;display:inline-block"></span>
      📋 Historial por fecha
    </div>

  </div>`;
}

function getNextSabado20() {
  const now = new Date();
  const day = now.getDay(); // 0=dom, 6=sab
  const diff = (6 - day + 7) % 7 || 7; // días hasta próximo sábado
  const sab = new Date(now);
  sab.setDate(now.getDate() + diff);
  sab.setHours(20, 0, 0, 0);
  return sab.toISOString().slice(0, 16);
}

  const val = document.getElementById('analisis-input').value;

function guardarCierre() {
  const val = document.getElementById('cierre-input').value;
  if (!val) return;
  state.mercadoCierre = new Date(val).toISOString();

function resetCierre() {
  state.mercadoCierre = new Date(getNextSabado20()).toISOString();
  save();
  renderAdminMercado();
}

function getCierreCountdown() {
  if (!state.mercadoCierre) return null;
  const now = new Date();
  const cierre = new Date(state.mercadoCierre);
  const diff = cierre - now;
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h >= 48) {
    const d = Math.floor(h / 24);
    return `${d} día${d>1?'s':''} y ${h%24}h`;
  }
  if (h >= 1) return `${h}h ${m}m`;
  return `${m} minutos`;
}

// ==================== RECOMENDACIONES ====================
function calcPlayerFechaPts(playerId, fechaNum) {
  const matches = state.matches.filter(m => String(m.fechaNum) === String(fechaNum));
  return matches.reduce((sum, m) => sum + calcPlayerMatchPts(playerId, m.id), 0);
}

function getJugadoresEnRacha() {
  // Obtener las últimas 3 fechas ANTERIORES a la fecha activa
  const todasFechas = [...new Set(state.matches.map(m => m.fechaNum).filter(Boolean))]
    .sort((a,b) => Number(a) - Number(b));
  const activaNum = state.activeFecha ? Number(state.activeFecha) : Infinity;
  const fechas = todasFechas.filter(f => Number(f) < activaNum).slice(-3);
  if (fechas.length === 0) return [];

  return state.players.map(p => {
    const ptsPorFecha = fechas.map(f => calcPlayerFechaPts(p.id, f));
    const total = ptsPorFecha.reduce((s, v) => s + v, 0);
    const promedio = total / fechas.length;
    return { player: p, ptsPorFecha, total, promedio, fechas };
  })
  .filter(x => x.total > 0)
  .sort((a, b) => b.total - a.total)
  .slice(0, 5);
}

function getJugadorDelTorneo() {
  if (state.players.length === 0) return null;
  let best = null, bestPts = -1;
  state.players.forEach(p => {
    const pts = calcPlayerTotalPts(p.id);
    if (pts > bestPts) { bestPts = pts; best = p; }
  });
  return (best && bestPts > 0) ? { player: best, pts: bestPts } : null;
}

function getMiJugadoresBajoRendimiento() {
  const roster = [...(state.dtTeams[currentDtId] || []), ...Object.values(state.dtSubs[currentDtId] || {})];
  const fechas = [...new Set(state.matches.map(m => m.fechaNum).filter(Boolean))]
    .sort((a,b) => Number(b) - Number(a))
    .slice(0, 3);
  if (fechas.length < 2) return [];
  return roster.map(pid => {
    const p = state.players.find(pl => pl.id === pid);
    if (!p) return null;
    const pts = fechas.map(f => calcPlayerFechaPts(pid, f));
    const promedio = pts.reduce((s,v)=>s+v,0) / pts.length;
    return { player: p, pts, promedio };
  })
  .filter(x => x && x.promedio < 5 && x.pts.some(v => v > 0))
  .sort((a,b) => a.promedio - b.promedio)
  .slice(0, 3);
}

function getMasFichados() {
  return state.players.map(p => {
    const count = state.dts.filter(d => {
      const roster = state.dtTeams[d.id] || [];
      const subs = Object.values(state.dtSubs[d.id] || {});
      return roster.includes(p.id) || subs.includes(p.id);
    }).length;
    return { player: p, count };
  })
  .filter(x => x.count > 0)
  .sort((a,b) => b.count - a.count)
  .slice(0, 5);
}

function getLeyDelEx() {
  if (!state.activeFecha) return [];
  const matchesFecha = state.matches.filter(m => String(m.fechaNum) === String(state.activeFecha));
  if (matchesFecha.length === 0) return [];

  const result = [];
  matchesFecha.forEach(match => {
    const localTeam  = state.teams.find(t => String(t.id) === String(match.localId));
    const visitaTeam = state.teams.find(t => String(t.id) === String(match.visitaId));
    if (!localTeam || !visitaTeam) return;

    state.players.forEach(p => {
      if (!p.exTeamId) return;
      const pTeam = String(p.teamId).trim();
      const pEx   = String(p.exTeamId).trim();
      const local  = String(match.localId).trim();
      const visita = String(match.visitaId).trim();
      if (pTeam === local && pEx === visita) {
        result.push({ player: p, teamActual: localTeam, exTeam: visitaTeam, match });
      } else if (pTeam === visita && pEx === local) {
        result.push({ player: p, teamActual: visitaTeam, exTeam: localTeam, match });
      }
    });
  });
  return result;
}

      const local  = state.teams.find(t => String(t.id) === String(grupo.match.localId));
      const visita = state.teams.find(t => String(t.id) === String(grupo.match.visitaId));
      innerHtml += '<div style="background:rgba(245,200,66,0.06);border:1px solid rgba(245,200,66,0.15);border-top:none;padding:0.4rem 1rem;display:flex;align-items:center;gap:0.5rem">';
      innerHtml += '<div style="font-family:Barlow Condensed,sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--gold)">' + (local ? local.name : '') + ' vs ' + (visita ? visita.name : '') + '</div>';
      innerHtml += '<div style="flex:1;height:1px;background:rgba(245,200,66,0.15)"></div>';
      innerHtml += '<div style="font-size:0.65rem;color:var(--muted);font-family:Barlow Condensed,sans-serif">' + (grupo.match.date || '') + '</div></div>';
      grupo.jugadores.forEach(x => {
        const initials = x.player.name.split(' ').map(w => w[0]).slice(0,2).join('').toUpperCase();
        const posShort = (x.player.pos || '').substring(0,3).toUpperCase();
        const enMiEquipo = (state.dtTeams[currentDtId]||[]).includes(x.player.id) || Object.values(state.dtSubs[currentDtId]||{}).includes(x.player.id);
        const enEquipoTag = enMiEquipo ? '<span style="font-size:0.6rem;background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);border-radius:10px;padding:0.05rem 0.35rem;font-weight:700">En tu equipo</span>' : '';
        innerHtml += '<div style="display:flex;align-items:center;gap:0.75rem;background:rgba(10,22,40,0.9);border:1px solid var(--border);border-top:none;padding:0.75rem 1rem">';
        innerHtml += '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,rgba(245,200,66,0.2),rgba(245,200,66,0.05));border:1.5px solid rgba(245,200,66,0.3);display:flex;align-items:center;justify-content:center;font-family:Bebas Neue,sans-serif;font-size:0.85rem;color:var(--gold);flex-shrink:0">' + initials + '</div>';
        innerHtml += '<div style="flex:1"><div style="display:flex;align-items:center;gap:0.4rem"><div style="font-size:0.9rem;font-weight:700;color:var(--text)">' + x.player.name + '</div>';
        innerHtml += '<span style="background:rgba(255,255,255,0.07);border-radius:4px;padding:0.05rem 0.3rem;font-family:Barlow Condensed,sans-serif;font-size:0.63rem;font-weight:700;color:var(--muted)">' + posShort + '</span>' + enEquipoTag + '</div>';
        innerHtml += '<div style="font-size:0.75rem;color:var(--muted);margin-top:0.1rem">Juega en <strong style="color:var(--text)">' + x.teamActual.name + '</strong></div></div>';
        innerHtml += '<div style="text-align:right;flex-shrink:0"><div style="font-size:0.6rem;color:var(--muted);font-family:Barlow Condensed,sans-serif;letter-spacing:0.06em;text-transform:uppercase">Ex club</div>';
        innerHtml += '<div style="font-family:Barlow Condensed,sans-serif;font-size:0.9rem;font-weight:700;color:var(--red)">' + x.exTeam.name + '</div>';
        innerHtml += '<div style="font-size:0.65rem;color:var(--muted)">🔴 enfrenta</div></div></div>';
      });
    });
    analisisHtml = '<div style="margin-bottom:0.75rem">'
      + '<div style="background:linear-gradient(135deg,#0d1f3c,#0a1628);border:1px solid rgba(245,200,66,0.25);border-radius:16px 16px 0 0;padding:0.7rem 1rem;position:relative;overflow:hidden">'
      + '<div style="position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)"></div>'
      + '<div style="font-family:Bebas Neue,sans-serif;font-size:1rem;letter-spacing:0.08em;color:var(--gold)">⚠️ Ley del Ex</div>'
      + '<div style="font-size:0.7rem;color:var(--muted)">Jugadores que enfrentan a su ex club esta fecha</div>'
      + '</div>' + innerHtml
      + '<div style="height:8px;background:rgba(10,22,40,0.9);border:1px solid var(--border);border-top:none;border-radius:0 0 16px 16px"></div>'
      + '</div>';
  }

  // Jugador del torneo
  // Jugador del torneo
  const jugTorneoHtml = jugTorneo ? `
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem"><span style="width:3px;height:1rem;background:var(--gold);border-radius:2px;display:inline-block"></span>⭐ Jugador del torneo</div>
    <div style="background:linear-gradient(135deg,rgba(245,200,66,0.12),rgba(245,200,66,0.04));border:1px solid rgba(245,200,66,0.3);border-radius:14px;padding:0.9rem 1rem;margin-bottom:0.75rem;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:1rem;font-weight:700;color:var(--text)">${jugTorneo.player.name}</div>
        <div style="font-size:0.75rem;color:var(--muted);margin-top:0.15rem">
          ${state.teams.find(t=>t.id===jugTorneo.player.teamId)?.name||'Sin equipo'} ·
          <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gold)">$${jugTorneo.player.valor||0}M</span>
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);line-height:1">${jugTorneo.pts}</div>
        <div style="font-size:0.62rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.08em;text-transform:uppercase">pts torneo</div>
      </div>
    </div>` : '';

  // Jugadores en racha
  const rachaHtml = racha.length > 0 ? `
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem"><span style="width:3px;height:1rem;background:var(--gold);border-radius:2px;display:inline-block"></span>🔥 Jugadores en racha (últimas 3 fechas)</div>
    <div class="card" style="padding:0.75rem 1rem;margin-bottom:0.75rem">
      ${racha.map((x, i) => {
        const team = state.teams.find(t=>t.id===x.player.teamId);
        const enMiEquipo = (state.dtTeams[currentDtId]||[]).includes(x.player.id) || Object.values(state.dtSubs[currentDtId]||{}).includes(x.player.id);
        return `<div style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid var(--border);${i===racha.length-1?'border-bottom:none':''}">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:${i<3?'var(--gold)':'rgba(255,255,255,0.15)'};min-width:1.5rem;text-align:center;line-height:1">${i+1}</div>
          <div style="flex:1">
            <div style="font-size:0.9rem;font-weight:600;color:var(--text)">${x.player.name} ${enMiEquipo?'<span style="font-size:0.65rem;background:rgba(0,230,118,0.15);color:var(--green);border:1px solid rgba(0,230,118,0.3);border-radius:10px;padding:0.1rem 0.4rem">En tu equipo</span>':''}</div>
            <div style="font-size:0.72rem;color:var(--muted);margin-top:0.1rem;display:flex;align-items:center;gap:0.4rem">
              <span style="background:rgba(255,255,255,0.07);border-radius:4px;padding:0.1rem 0.35rem;font-family:'Barlow Condensed',sans-serif;font-size:0.65rem;font-weight:700">${x.player.pos||'—'}</span>
              ${team?team.name:'Sin equipo'} · <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--gold)">$${x.player.valor||0}M</span>
            </div>
            <div style="display:flex;gap:0.2rem;margin-top:0.25rem">
              ${x.ptsPorFecha.map(pts=>`<div style="width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:700;font-family:'Barlow Condensed',sans-serif;background:${pts>=10?'rgba(0,230,118,0.2)':pts>=6?'rgba(255,214,0,0.2)':'rgba(255,61,107,0.15)'};color:${pts>=10?'var(--green)':pts>=6?'var(--yellow)':'var(--red)'}">${pts}</div>`).join('')}
            </div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--green);line-height:1">${x.total}</div>
            <div style="font-size:0.62rem;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:0.06em;text-transform:uppercase">últ. 3</div>
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  // Alertas de mi equipo
  const bajosHtml = bajos.length > 0 ? `
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem"><span style="width:3px;height:1rem;background:var(--gold);border-radius:2px;display:inline-block"></span>⚠️ En tu equipo — bajo rendimiento</div>
    ${bajos.map(x=>`
      <div style="background:rgba(255,61,107,0.06);border:1px solid rgba(255,61,107,0.2);border-radius:12px;padding:0.65rem 0.9rem;margin-bottom:0.5rem;display:flex;gap:0.6rem;align-items:center">
        <div style="font-size:1rem">📉</div>
        <div style="font-size:0.82rem;color:var(--text);line-height:1.5"><strong style="color:var(--red)">${x.player.name}</strong> lleva ${x.pts.filter(v=>v<5).length} fecha${x.pts.filter(v=>v<5).length>1?'s':''} por debajo de 5 pts. Considerá transferirlo.</div>
      </div>`).join('')}` : '';

  // Más fichados
  const fichHtml = '';

  tc.innerHTML = `<div style="padding:1rem">
    ${analisisHtml}
    ${jugTorneoHtml}
    ${rachaHtml}
    ${bajosHtml}
    ${fichHtml}
    ${racha.length===0 && !jugTorneo && leyDelExData.length===0 ? `<div class="empty-state"><div class="empty-icon">💡</div><p>Las recomendaciones aparecen cuando haya partidos jugados</p></div>` : ''}
  </div>`;
}

// ==================== HISTORIAL POR FECHA ====================
let rankingFechaFilter = null; // null = general

function renderDtRanking(fechaFilter) {
  if (fechaFilter !== undefined) rankingFechaFilter = fechaFilter;
  const tc = document.getElementById('tab-content');
  const fechasDisponibles = [...new Set(state.matches.map(m => m.fechaNum).filter(Boolean))].sort((a,b)=>Number(a)-Number(b));

  function rankRow(d, i, ptsValue, ptsLabel) {
    return `
      <div class="ranking-item">
        <div class="rank-num ${i===0?'top1':i===1?'top2':i===2?'top3':''}">${i+1}</div>
        <div class="rank-info">
          <div class="rank-name">${d.name} ${d.id===currentDtId?'<span style="color:var(--green);font-size:0.75rem">← Vos</span>':''}</div>
          <div class="rank-team">${(state.dtTeams[d.id]||[]).length + Object.values(state.dtSubs[d.id]||{}).length}/15</div>
        </div>
        <div style="text-align:right">
          <div class="rank-pts">${ptsValue}${!isDtTeamComplete(d.id)?'<span style="font-size:0.55rem;color:#FF8F00;background:#FF8F0022;border:1px solid #FF8F0066;border-radius:4px;padding:1px 4px;margin-left:4px">incompleto</span>':''}${rankingFechaFilter && !isDtHabilitado(d.id, rankingFechaFilter)?'<span style="font-size:0.55rem;color:#FF3D6B;background:#FF3D6B22;border:1px solid #FF3D6B66;border-radius:4px;padding:1px 4px;margin-left:4px">sin pago</span>':''}</div>
          <div style="font-size:0.65rem;color:var(--muted)">${ptsLabel}</div>
        </div>
      </div>`;
  }

  const filterChips = `
    <div class="filter-bar" style="margin-bottom:1rem">
      <div class="filter-chip ${!rankingFechaFilter?'active':''}" onclick="renderDtRanking(null)">🏆 General</div>
      ${fechasDisponibles.map(f => `<div class="filter-chip ${rankingFechaFilter===f?'active':''}" onclick="renderDtRanking('${f}')">Fecha ${f}</div>`).join('')}
    </div>`;

  let rows = '';
  if (!rankingFechaFilter) {
    const sorted = [...state.dts].sort((a,b) => calcDtPts(b.id) - calcDtPts(a.id));
    rows = sorted.map((d,i) => rankRow(d, i, calcDtPts(d.id), 'torneo')).join('');
  } else {
    const sorted = [...state.dts].sort((a,b) => calcDtFechaPts(b.id, rankingFechaFilter) - calcDtFechaPts(a.id, rankingFechaFilter));
    rows = sorted.map((d,i) => rankRow(d, i, calcDtFechaPts(d.id, rankingFechaFilter), 'F'+rankingFechaFilter)).join('');
  }

  tc.innerHTML = `
    <div class="card">
      <div class="card-title">${rankingFechaFilter ? '📅 Ranking Fecha '+rankingFechaFilter : '🏆 Ranking General'}</div>
      ${filterChips}
      ${state.dts.length === 0 ? `<div class="empty-state"><p>No hay DTs aún</p></div>` : rows}
    </div>`;
}

</script>
</body>
